name: Release

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: Build and verify without publishing
        type: boolean
        default: true
  push:
    tags: ['v*']

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run typecheck
      - run: npm run build
      - run: npm run test:trace-cli
      - run: npm test
      - run: npm pack --dry-run
      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: test "$GITHUB_REF_NAME" = "v$(node -p "require('./package.json').version")"
      - name: Build release package
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm pack
      - name: Publish with provenance
        if: startsWith(github.ref, 'refs/tags/v') && inputs['dry-run'] != true
        run: |
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            npm publish --provenance --tag next
          else
            npm publish --provenance
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v') && inputs['dry-run'] != true
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: '*.tgz'
