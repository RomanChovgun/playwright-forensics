<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Checkbox Mismatch — check() on a button</title>
<style>
  body { font-family: sans-serif; padding: 2rem; }
  .card { border: 1px solid #ccc; border-radius: 8px; padding: 1.5rem; max-width: 500px; }
  .pref-group { margin-bottom: 1rem; }
  label { display: block; margin: 0.5rem 0; }
  button { padding: 0.5rem 1rem; cursor: pointer; margin: 0.25rem; }
  .note { font-size: 0.85rem; color: #666; margin-top: 0.5rem; }
</style>
</head>
<body>
<div class="card">
  <h2>Settings</h2>
  <div class="pref-group">
    <h3>Notifications</h3>
    <label>
      <input type="checkbox" data-testid="notif-email" checked /> Email notifications
    </label>
    <label>
      <input type="checkbox" data-testid="notif-sms" /> SMS notifications
    </label>
    <label>
      <input type="checkbox" data-testid="notif-push" /> Push notifications
    </label>
  </div>
  <div class="pref-group">
    <h3>Actions</h3>
    <button id="save-btn" data-testid="save-btn" onclick="save()">💾 Save settings</button>
    <button id="reset-btn" data-testid="reset-btn" onclick="reset()">↺ Reset</button>
  </div>
  <p class="note" id="result">Select notification preferences and save.</p>
</div>

<script>
  function save() {
    const checks = document.querySelectorAll('[data-testid^="notif-"]:checked');
    document.getElementById('result').textContent = `Saved ${checks.length} preferences`;
  }
  function reset() {
    document.querySelectorAll('[data-testid^="notif-"]').forEach(c => c.checked = false);
    document.getElementById('result').textContent = 'Reset all preferences';
  }
</script>
</body>
</html>
