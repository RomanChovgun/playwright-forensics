<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Modal Overlay — element blocked by notification</title>
<style>
  body { font-family: sans-serif; padding: 2rem; }
  .card { border: 1px solid #ccc; border-radius: 8px; padding: 1.5rem; max-width: 500px; }
  .actions { margin-top: 1rem; }
  button { padding: 0.5rem 1rem; cursor: pointer; margin-right: 0.5rem; }
  .modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9998;
  }
  .modal-content {
    background: white;
    padding: 2rem;
    border-radius: 8px;
    max-width: 400px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }
  .danger-zone {
    margin-top: 2rem;
    padding: 1rem;
    border: 2px dashed #dc3545;
    border-radius: 8px;
    background: #fff5f5;
  }
  .danger-zone button { background: #dc3545; color: white; }
</style>
</head>
<body>
<div class="card">
  <h2>Control Panel</h2>

  <div class="actions">
    <button id="modal-btn" data-testid="show-modal" onclick="showModal()">
      📋 Open modal
    </button>
  </div>

  <div class="danger-zone" id="danger-zone">
    <h3>⚠️ Danger Zone</h3>
    <p>These buttons may be blocked by modal overlays</p>
    <button id="delete-btn" data-testid="delete-account-btn" onclick="confirmDelete()">
      🗑️ Delete account
    </button>
    <button id="export-btn" data-testid="export-data-btn" onclick="exportData()">
      📤 Export data
    </button>
  </div>
</div>

<script>
  function showModal() {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.setAttribute('data-testid', 'modal-overlay');
    overlay.innerHTML = `
      <div class="modal-content" data-testid="modal-content">
        <h3>Confirmation</h3>
        <p>Are you sure you want to proceed?</p>
        <button onclick="closeModal()" data-testid="modal-confirm">✅ Yes</button>
        <button onclick="closeModal()" data-testid="modal-cancel">❌ No</button>
      </div>
    `;
    document.body.appendChild(overlay);
  }

  function closeModal() {
    const overlay = document.querySelector('.modal-overlay');
    if (overlay) overlay.remove();
  }

  function confirmDelete() {
    alert('Deleting... (protected)');
  }

  function exportData() {
    alert('Exporting data...');
  }
</script>
</body>
</html>
